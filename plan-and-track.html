<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    html, body, #root { font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .md-content { font-size: 13px; line-height: 1.65; }

<body style="margin:0;background:#FFFFFF;overflow:hidden;">
  <script>
    window.__saveStatus = (function(){
      let t;
      const el = () => document.getElementById('saveStatus');
      const txt = () => document.getElementById('saveStatusText');
      return {
        saving(){ clearTimeout(t); if(!el())return; el().classList.add('is-saving'); el().classList.remove('is-saved'); txt().textContent='syncing…'; },
        saved(){ clearTimeout(t); if(!el())return; el().classList.remove('is-saving'); el().classList.add('is-saved'); txt().textContent='saved'; t=setTimeout(()=>{ if(txt())txt().textContent='auto-saved'; },1500); },
        failed(){ clearTimeout(t); if(!el())return; el().classList.remove('is-saving','is-saved'); txt().textContent='sync failed'; t=setTimeout(()=>{ if(txt())txt().textContent='auto-saved'; },2500); }
      };
    })();
  </script>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const API = '/data/plan-and-track';
    const uid = () => Math.random().toString(36).slice(2, 8);
    const today = () => new Date().toISOString().slice(0, 10);
    const now = () => new Date().toISOString();

    /* ── URL linkification ── */
    const URL_RE = /https?:\/\/[^\s<>"')\]]+/g;
    const extractUrls = (text) => {
      if (typeof text !== "string" || !text) return [];
      const out = []; let m;
      URL_RE.lastIndex = 0;
      while ((m = URL_RE.exec(text)) !== null) {
        let url = m[0];
        while (url.length && ".,;:!?".includes(url[url.length-1])) url = url.slice(0, -1);
        if (url) out.push(url);
      }
      return out;
    };
    const linkify = (text) => {
      if (typeof text !== "string" || !text) return text;
      const out = []; let last = 0; let m; URL_RE.lastIndex = 0;
      while ((m = URL_RE.exec(text)) !== null) {
        let url = m[0]; let trailing = "";
        while (url.length && ".,;:!?".includes(url[url.length-1])) {
          trailing = url[url.length-1] + trailing;
          url = url.slice(0, -1);
        }
        if (!url) continue;
        if (m.index > last) out.push(text.slice(last, m.index));
        out.push(
          <a key={`u-${m.index}`} href={url} target="_blank" rel="noopener noreferrer"
             onClick={e=>e.stopPropagation()}
             onDoubleClick={e=>e.stopPropagation()}
             onMouseDown={e=>e.stopPropagation()}
             style={{color:"inherit",textDecoration:"underline",textUnderlineOffset:"2px",wordBreak:"break-all"}}>
            {url}
          </a>
        );
        if (trailing) out.push(trailing);
        last = m.index + m[0].length;
      }
      if (!out.length) return text;
      if (last < text.length) out.push(text.slice(last));
      return out;
    };
    const hostOf = (u) => { try { return new URL(u).hostname.replace(/^www\./,""); } catch(e) { return u; } };
    const fmtDate = d => { if (!d) return ""; try { const s = d.includes("T") ? d : d + "T00:00:00"; return new Date(s).toLocaleDateString("en-GB", { day: "numeric", month: "short" }); } catch(e) { return d; } };
    const fmtDateLong = d => { if (!d) return ""; try { const s = d.includes("T") ? d : d + "T00:00:00"; return new Date(s).toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" }); } catch(e) { return d; } };

    function getWeekLabel(dateStr) {
      if (!dateStr) return "Undated";
      const d = new Date(dateStr + "T00:00:00");
      const now = new Date();
      const startOfWeek = dt => { const d2 = new Date(dt); d2.setDate(d2.getDate() - d2.getDay() + 1); d2.setHours(0,0,0,0); return d2; };
      const thisWeekStart = startOfWeek(now);
      const sessionWeekStart = startOfWeek(d);
      const diff = (thisWeekStart - sessionWeekStart) / (7 * 24 * 60 * 60 * 1000);
      if (diff === 0) return "This week";
      if (diff === 1) return "Last week";
      return d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    }

    /* ── Themes (Notes app aesthetic) ── */
    const LIGHT = {
      pageBg: "#FFFFFF", surface: "#FFFFFF", surface2: "#F5F5F7", surfaceHover: "#EBEBF0",
      border: "#E5E5E7", borderStrong: "#D2D2D7", borderDash: "rgba(0,0,0,0.18)",
      text: "#1D1D1F", muted: "#86868B", faint: "#C7C7CC",
      accent: "#C99D20", accentLight: "#FEF3C7", accentBorder: "#F3DC88",
      green: "#248A3D", greenBg: "#D1F1D9", yellowText: "#8A6A14", yellowBg: "#FEF3C7",
      redText: "#D70015", redBg: "rgba(215,0,21,0.08)", blueText: "#0071E3", blueBg: "#D9ECFB",
      indigoText: "#3634A3", indigoBg: "#E3E2F7", neutralBg: "#F5F5F7", neutralText: "#86868B",
      menuBg: "#FFFFFF", menuShadow: "0 4px 20px rgba(0,0,0,0.10)",
    };
    const DARK = {
      pageBg: "#1C1C1E", surface: "#2C2C2E", surface2: "rgba(255,255,255,0.04)", surfaceHover: "rgba(255,255,255,0.08)",
      border: "rgba(255,255,255,0.09)", borderStrong: "rgba(255,255,255,0.15)", borderDash: "rgba(255,255,255,0.22)",
      text: "#F5F5F7", muted: "#98989D", faint: "#6C6C70",
      accent: "#FFD60A", accentLight: "rgba(255,214,10,0.15)", accentBorder: "rgba(255,214,10,0.35)",
      green: "#30D158", greenBg: "rgba(48,209,88,0.15)", yellowText: "#FFD60A", yellowBg: "rgba(255,214,10,0.14)",
      redText: "#FF453A", redBg: "rgba(255,69,58,0.14)", blueText: "#0A84FF", blueBg: "rgba(10,132,255,0.14)",
      indigoText: "#5E5CE6", indigoBg: "rgba(94,92,230,0.14)", neutralBg: "rgba(255,255,255,0.06)", neutralText: "#98989D",
      menuBg: "#2C2C2E", menuShadow: "0 4px 20px rgba(0,0,0,0.45)",
    };

    const statusSt = (s, T) => ({ active: { bg: T.greenBg, c: T.green, dot: T.green }, waiting: { bg: T.yellowBg, c: T.yellowText, dot: T.yellowText }, planned: { bg: T.indigoBg, c: T.indigoText, dot: T.indigoText }, done: { bg: T.neutralBg, c: T.neutralText, dot: T.faint } })[s] || { bg: T.neutralBg, c: T.neutralText, dot: T.faint };
    const tagSt = (t, T) => ({ AIMS: { bg: T.greenBg, c: T.green }, Lifetime: { bg: T.blueBg, c: T.blueText }, XG: { bg: T.indigoBg, c: T.indigoText } })[t] || { bg: T.neutralBg, c: T.neutralText };
    const priDot = (p, T) => ({ high: T.redText, medium: T.yellowText, low: T.blueText })[p] || T.faint;

    /* ── Data & Migration ── */
    const DEFAULT_DATA = {
      _schemaVersion: 17, theme: "light", archivedSections: [],
      userName: "Name", userRole: "Role",
      focusAreas: [],
      thisWeek: [],
      previousWeeks: [],
      nextSteps: [],
      timeline: [],
      weeklyReports: [],
      initiatives: [],
      contextItems: [],
      sessions: [],
    };

    function migrate(d) {
      if (!d.theme) d.theme="light"; if (!d.archivedSections) d.archivedSections=[]; if (!d.thisWeek) d.thisWeek=[]; if (!d.nextSteps) d.nextSteps=[]; if (!d.timeline) d.timeline=[]; if (!d.initiatives) d.initiatives=[]; if (!d.contextItems) d.contextItems=[]; if (!d.sessions) d.sessions=[];
      if (!d.weeklyReports) d.weeklyReports=[];
      if (!d.previousWeeks) d.previousWeeks=[];
      if (!d.userName) d.userName="Name"; if (!d.userRole) d.userRole="Role";
      if (!d.focusAreas) d.focusAreas=[{id:uid(),text:"Delivery"},{id:uid(),text:"Innovation"},{id:uid(),text:"Standards"},{id:uid(),text:"Conceptual models"}];
      d.sessions=d.sessions.map(s=>{const ca=s.createdAt||(s.date?s.date+"T00:00:00.000Z":new Date().toISOString());return{...s,type:s.type||"meeting",blocks:(s.blocks||[]).map(b=>({...b,notes:b.notes??"",covered:b.covered??false})),file:s.file||null,createdAt:ca,startTime:s.startTime||new Date(ca).toTimeString().slice(0,5)};});
      d.initiatives=d.initiatives.map(i=>({...i,notes:i.notes??""}));
      // Fold legacy opportunities into initiatives (schema v13).
      if (Array.isArray(d.opportunities) && d.opportunities.length) {
        const oppStatusToInit={open:"planned","in-progress":"active",done:"done",parked:"waiting"};
        const folded=d.opportunities.map(o=>({id:o.id||uid(),name:o.title||"",phase:0,status:oppStatusToInit[o.status]||"planned",note:o.detail||"",notes:o.notes||"",priority:o.priority||null,tags:Array.isArray(o.tags)?o.tags:[]}));
        d.initiatives=[...d.initiatives,...folded];
      }
      delete d.opportunities;
      d.nextSteps=d.nextSteps.map(n=>({...n,owner:n.owner??"Me",due:n.due??"",source:n.source??"",done:n.done??false,createdAt:n.createdAt??today()}));
      d.thisWeek=d.thisWeek.map(t=>({...t,source:t.source??"",owner:t.owner??"Me",createdAt:t.createdAt??today(),children:Array.isArray(t.children)?t.children.map(c=>({...c,owner:c.owner??"Me",due:c.due??"",source:c.source??"",done:c.done??false,createdAt:c.createdAt??today()})):[]}));
      d.previousWeeks=(d.previousWeeks||[]).map(b=>({id:b.id||uid(),year:b.year,week:b.week,dateRange:b.dateRange||"",archivedAt:b.archivedAt||today(),items:(b.items||[]).map(t=>({...t,source:t.source??"",owner:t.owner??"Me",createdAt:t.createdAt??today(),children:Array.isArray(t.children)?t.children:[]})),sessions:(b.sessions||[]).map(s=>{const ca=s.createdAt||(s.date?s.date+"T00:00:00.000Z":new Date().toISOString());return{...s,type:s.type||"meeting",blocks:(s.blocks||[]).map(x=>({...x,notes:x.notes??"",covered:x.covered??false})),file:s.file||null,createdAt:ca,startTime:s.startTime||new Date(ca).toTimeString().slice(0,5)};})}));
      d.timeline=(d.timeline||[]).map(t=>({...t,detail:t.detail??"",owner:t.owner??"Me",source:t.source??"",completedDate:t.completedDate??today()}));
      d.weeklyReports=(d.weeklyReports||[]).map(r=>({id:r.id||uid(),year:r.year,week:r.week,filename:r.filename||`weekly-report-${r.year}-W${String(r.week).padStart(2,"0")}.md`,content:r.content||"",createdAt:r.createdAt||today()}));
      // v17: Context section removed. Clean it from archivedSections if present.
      d.archivedSections=(d.archivedSections||[]).filter(s=>s!=="context");
      d._schemaVersion=17; return d;
    }

    /* ── Server-backed data layer ── */
    async function loadData() {
      try {
        const res = await fetch(API);
        const raw = await res.json();
        if (raw && typeof raw === 'object' && raw._schemaVersion) {
          const m = migrate(raw);
          if (raw._schemaVersion !== m._schemaVersion) await saveData(m);
          return m;
        }
      } catch(e) { console.warn('Load from server failed:', e); }
      return DEFAULT_DATA;
    }
    async function saveData(d) {
      window.__saveStatus && window.__saveStatus.saving();
      try {
        await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) });
        window.__saveStatus && window.__saveStatus.saved();
      } catch(e) {
        window.__saveStatus && window.__saveStatus.failed();
        console.warn('Save failed:', e);
      }
    }
    const useT = d => d.theme==="dark"?DARK:LIGHT;

    /* ── Shared Components ── */
    const Pill = ({text,bg,color,onClick}) => <span onClick={onClick} style={{display:"inline-block",fontSize:10,fontWeight:500,padding:"2px 9px",borderRadius:100,background:bg,color,cursor:onClick?"pointer":"default",userSelect:"none"}}>{text}</span>;
    const Card = ({T,children,style:s={}}) => <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 18px",marginBottom:10,...s}}>{children}</div>;
    const Lbl = ({T,children,rightSlot,onClick,expanded}) => {
      const txt={fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.08em",color:T.faint};
      if (!rightSlot && !onClick) return <div style={{...txt,margin:"28px 0 10px"}}>{children}</div>;
      const labelNode = onClick
        ? <button onClick={onClick} style={{...txt,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>{children}<span style={{fontSize:9,transform:expanded?"none":"rotate(-90deg)",transition:"transform 0.2s",color:T.faint}}>▼</span></button>
        : <div style={txt}>{children}</div>;
      return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,margin:"28px 0 10px"}}>{labelNode}{rightSlot||null}</div>;
    };
    const Bar = ({T,done,total,style:s={}}) => { const p=total>0?Math.round((done/total)*100):0; return <div style={{display:"flex",alignItems:"center",gap:12,...s}}><div style={{flex:1,height:3,background:T.border,borderRadius:2}}><div style={{height:"100%",width:`${p}%`,background:T.accent,borderRadius:2,transition:"width 0.4s"}}/></div><span style={{fontSize:12,color:T.muted}}><span style={{color:T.accent,fontWeight:500}}>{done}</span> / {total}</span></div>; };
    const Check = ({T,checked,onChange,size=20}) => <div onClick={onChange} style={{width:size,height:size,borderRadius:5,border:checked?"none":`1.5px solid ${T.borderStrong}`,background:checked?T.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{checked&&<svg width={size*.55} height={size*.55} viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div>;
    const Plus = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>;
    const Trash = () => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 4h8l-.7 7.3a1 1 0 01-1 .7H4.7a1 1 0 01-1-.7L3 4zM5.5 6.5v3M8.5 6.5v3M2 4h10M5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const Arrow = () => <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const Sun = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>;
    const UploadIcon = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 10V2M4 5l3-3 3 3M2 11h10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const Moon = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.36 10.05A6 6 0 015.95 2.64 6 6 0 1013.36 10.05z" stroke="currentColor" strokeWidth="1.3" strokeLinejoin="round"/></svg>;
    const IBtn = ({T,onClick,children,title}) => <button onClick={onClick} title={title} style={{background:"none",border:"none",cursor:"pointer",padding:4,borderRadius:6,color:T.faint,display:"flex",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.color=T.text} onMouseLeave={e=>e.currentTarget.style.color=T.faint}>{children}</button>;
    const AddBtn = ({T,onClick,label,style:s={}}) => <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,color:T.accent,background:"transparent",border:`1px dashed ${T.accent}`,borderRadius:100,cursor:"pointer",padding:"10px 18px",fontFamily:"inherit",marginBottom:10,...s}}><Plus/> {label}</button>;
    const DateIn = ({T,value,onChange}) => <input type="date" value={value} onChange={e=>onChange(e.target.value)} style={{fontSize:11,fontFamily:"inherit",border:`1px solid ${T.border}`,borderRadius:6,padding:"1px 4px",color:T.muted,outline:"none",background:T.surface2}}/>;
    const TimeIn = ({T,value,onChange}) => <input type="time" value={value||""} onChange={e=>onChange(e.target.value)} style={{fontSize:11,fontFamily:"inherit",border:`1px solid ${T.border}`,borderRadius:6,padding:"1px 4px",color:T.muted,outline:"none",background:T.surface2}}/>;
    const srt=(arr,s,nk,dk)=>arr.slice().sort((a,b)=>{const va=s.field==="name"?(a[nk]||"").toLowerCase():(a[dk]||"");const vb=s.field==="name"?(b[nk]||"").toLowerCase():(b[dk]||"");return(va<vb?-1:va>vb?1:0)*(s.dir==="asc"?1:-1);});
    const SortCtrl=({T,sort,setSort,options,style:s={}})=><div style={{display:"flex",gap:4,alignItems:"center",marginBottom:14,flexWrap:"wrap",...s}}><span style={{fontSize:11,color:T.faint,marginRight:2}}>Sort:</span>{options.map(o=>{const act=sort.field===o.field;return <button key={o.field} onClick={()=>{if(act)setSort(s=>({...s,dir:s.dir==="asc"?"desc":"asc"}));else setSort({field:o.field,dir:o.dir||"asc"});}} style={{fontSize:11,fontWeight:500,padding:"2px 9px",borderRadius:100,border:`1px solid ${act?T.accent:T.border}`,background:act?T.accentLight:"transparent",color:act?T.accent:T.faint,cursor:"pointer",fontFamily:"inherit",lineHeight:"18px"}}>{o.label}{act?(" "+(sort.dir==="asc"?"↑":"↓")):""}</button>;})}</div>;

    function InlineEdit({T,value,onChange,placeholder,style:s={}}) {
      const [ed,setEd]=useState(false); const [d,setD]=useState(value); const r=useRef(null); const committed=useRef(false);
      useEffect(()=>{setD(value);},[value]);
      useEffect(()=>{if(ed&&r.current){committed.current=false;r.current.focus();}},[ed]);
      const commit=()=>{if(committed.current)return;committed.current=true;if(d!==value)onChange(d);setEd(false);};
      if(!ed) return <span onDoubleClick={()=>{setD(value);setEd(true);}} style={{cursor:"text",...s}} title="Double-click to edit">{value?linkify(value):<span style={{color:T.faint,fontStyle:"italic"}}>{placeholder}</span>}</span>;
      return <input ref={r} value={d} onChange={e=>setD(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setD(value);setEd(false);}}} style={{fontSize:"inherit",fontFamily:"inherit",fontWeight:"inherit",color:"inherit",border:"none",borderBottom:`2px solid ${T.accent}`,outline:"none",background:"transparent",width:"100%",padding:0,...s}}/>;
    }
    function AddNS({T,source,update}) {
      const [o,setO]=useState(false);const [t,setT]=useState("");const r=useRef(null);
      useEffect(()=>{if(o&&r.current)r.current.focus();},[o]);
      const go=()=>{if(!t.trim())return;update(d=>({...d,nextSteps:[...d.nextSteps,{id:uid(),text:t.trim(),owner:"Me",due:"",source,done:false,createdAt:now()}]}));setT("");setO(false);};
      if(!o) return <button onClick={()=>setO(true)} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,color:T.accent,background:"none",border:"none",cursor:"pointer",padding:"4px 0",marginTop:6}}><Arrow/> Add next steps</button>;
      return <div style={{display:"flex",gap:6,marginTop:6}}><input ref={r} value={t} onChange={e=>setT(e.target.value)} placeholder="Next step..." onKeyDown={e=>{if(e.key==="Enter")go();if(e.key==="Escape")setO(false);}} style={{flex:1,fontSize:12,padding:"5px 8px",border:`1px solid ${T.border}`,borderRadius:8,fontFamily:"inherit",outline:"none",background:T.surface2,color:T.text}}/><button onClick={go} style={{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:100,border:"none",background:T.accent,color:"#fff",cursor:"pointer"}}>Add</button><button onClick={()=>{setO(false);setT("");}} style={{fontSize:11,padding:"5px 8px",borderRadius:100,border:`1px solid ${T.border}`,background:T.surface,color:T.muted,cursor:"pointer"}}>×</button></div>;
    }
    function FNotes({T,value,onChange,source,update,ph="Notes..."}) {
      const urls = extractUrls(value||"");
      return <div>
        <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{width:"100%",minHeight:50,fontSize:13,color:T.muted,lineHeight:1.6,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px",fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif",resize:"vertical",outline:"none",background:T.surface2}}/>
        {urls.length>0 && <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>

    function weekDateRange(year, week) {
      // ISO week 1 = week containing Jan 4. Compute Monday of that week, then add (week-1)*7 days.
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const mondayW1 = new Date(jan4);
      mondayW1.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
      const monday = new Date(mondayW1);
      monday.setUTCDate(mondayW1.getUTCDate() + (week - 1) * 7);
      const friday = new Date(monday);
      friday.setUTCDate(monday.getUTCDate() + 4);
      const fmt = d => d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
      return `${fmt(monday)}–${fmt(friday)}, ${year}`;
    }

    /* ── ICS (iCalendar) parser · minimal, RFC 5545 subset ── */
    function parseIcs(text) {
      const unfolded = text.replace(/\r?\n[ \t]/g, '');
      const lines = unfolded.split(/\r?\n/);
      const events = []; let cur = null;
      for (const line of lines) {
        if (line === 'BEGIN:VEVENT') { cur = { attendees: [], exdates: [] }; continue; }
        if (line === 'END:VEVENT') { if (cur) events.push(cur); cur = null; continue; }
        if (!cur) continue;
        const ci = line.indexOf(':'); if (ci < 0) continue;
        const lhs = line.slice(0, ci), value = line.slice(ci + 1);
        const parts = lhs.split(';'); const name = parts[0].toUpperCase(); const params = {};
        for (let i = 1; i < parts.length; i++) { const eq = parts[i].indexOf('='); if (eq > 0) params[parts[i].slice(0, eq).toUpperCase()] = parts[i].slice(eq + 1); }
        if (name === 'ATTENDEE') cur.attendees.push({ value, params });
        else if (name === 'EXDATE') cur.exdates.push(value);
        else cur[name] = { value, params };
      }
      return events;
    }
    function icsUnesc(s) { return s.replace(/\\n/gi, '\n').replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\\\/g, '\\'); }
    function parseIcsDate(value) {
      if (!value) return null;
      const v = value.replace(/Z$/, '');
      if (v.length === 8) { const y=+v.slice(0,4), m=+v.slice(4,6)-1, d=+v.slice(6,8); return { date: new Date(y, m, d), allDay: true }; }
      if (v.length >= 15) {
        const y=+v.slice(0,4), m=+v.slice(4,6)-1, d=+v.slice(6,8);
        const hh=+v.slice(9,11), mm=+v.slice(11,13), ss=+v.slice(13,15);
        const isUTC = value.endsWith('Z');
        return { date: isUTC ? new Date(Date.UTC(y,m,d,hh,mm,ss)) : new Date(y,m,d,hh,mm,ss), allDay: false };
      }
      return null;
    }
    function expandRecurrence(ev, rangeStart, rangeEnd) {
      const st = parseIcsDate(ev.DTSTART?.value); if (!st) return [];
      const et = parseIcsDate(ev.DTEND?.value);
      const dur = et ? (et.date - st.date) : (st.allDay ? 86400000 : 1800000);
      const ex = new Set((ev.exdates || []).map(e => parseIcsDate(e)?.date).filter(Boolean).map(d => d.toISOString().slice(0,10)));
      const mk = (startDate) => ({ start: startDate, end: new Date(startDate.getTime() + dur), allDay: st.allDay });
      if (!ev.RRULE) { return (st.date >= rangeStart && st.date <= rangeEnd) ? [mk(st.date)] : []; }
      const rule = {}; for (const p of ev.RRULE.value.split(';')) { const [k,v] = p.split('='); rule[k] = v; }
      const freq = rule.FREQ; const interval = rule.INTERVAL ? +rule.INTERVAL : 1;
      const until = rule.UNTIL ? parseIcsDate(rule.UNTIL)?.date : null;
      const byday = rule.BYDAY ? rule.BYDAY.split(',') : null;
      const dayMap = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };
      const limit = until && until < rangeEnd ? until : rangeEnd;
      const out = [];
      for (let t = new Date(Math.max(st.date.getTime(), rangeStart.getTime() - 86400000)); t <= limit; t = new Date(t.getTime() + 86400000)) {
        let match = false;
        if (freq === 'DAILY') { const days = Math.round((t - st.date) / 86400000); match = days >= 0 && days % interval === 0; }
        else if (freq === 'WEEKLY') { const weeks = Math.floor((t - st.date) / 604800000); if (weeks >= 0 && weeks % interval === 0) { if (byday) match = byday.includes(Object.keys(dayMap).find(k => dayMap[k] === t.getDay())); else match = t.getDay() === st.date.getDay(); } }
        else if (freq === 'MONTHLY') { match = t.getDate() === st.date.getDate(); }
        if (match) {
          const inst = new Date(t);
          inst.setHours(st.date.getHours(), st.date.getMinutes(), st.date.getSeconds(), 0);
          if (inst >= rangeStart && inst <= rangeEnd) {
            const iso = inst.toISOString().slice(0,10);
            if (!ex.has(iso)) out.push(mk(inst));
          }
        }
      }
      return out;
    }
    function icsToSessionCandidates(text, userEmail) {
      const events = parseIcs(text);
      const now = new Date();
      const rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
      const rangeEnd = new Date(rangeStart.getTime() + 7 * 86400000);
      const ul = (userEmail || '').toLowerCase();
      const out = [];
      for (const ev of events) {
        if (ev.STATUS?.value === 'CANCELLED') continue;
        const orgMatch = ev.ORGANIZER?.value?.toLowerCase().includes(ul);
        const accepted = (ev.attendees || []).some(a => a.value.toLowerCase().includes(ul) && (a.params.PARTSTAT || '').toUpperCase() === 'ACCEPTED');
        const noAtt = !ev.attendees?.length;
        if (!(orgMatch || accepted || noAtt)) continue;
        for (const occ of expandRecurrence(ev, rangeStart, rangeEnd)) {
          const d = occ.start; const pad = n => String(n).padStart(2, '0');
          const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
          const startTime = occ.allDay ? '' : `${pad(d.getHours())}:${pad(d.getMinutes())}`;
          const endTime = occ.allDay ? '' : `${pad(occ.end.getHours())}:${pad(occ.end.getMinutes())}`;
          out.push({
            _icsUid: (ev.UID?.value || '') + '|' + dateStr + (startTime ? 'T' + startTime : ''),
            label: ev.SUMMARY ? icsUnesc(ev.SUMMARY.value) : 'Untitled event',
            date: dateStr, startTime, endTime,
            agenda: ev.DESCRIPTION ? icsUnesc(ev.DESCRIPTION.value) : '',
            allDay: occ.allDay
          });
        }
      }
      return out;
    }

            <span style={{fontSize:12,color:T.faint,transform:isExp?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
          </div>
          {isExp&&<div style={{borderTop:`1px solid ${T.border}`,padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{flex:1}}><InlineEdit T={T} value={s.label} onChange={v=>updLabel(s.id,v)} style={{fontSize:15,fontWeight:500}}/></div>
              <DateIn T={T} value={s.date} onChange={v=>updDate(s.id,v)}/>
              <TimeIn T={T} value={s.startTime} onChange={v=>updStartTime(s.id,v)}/>

                <div onClick={()=>setObi(io?null:bl.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>

                  <div style={{flex:1,fontSize:13,fontWeight:500,color:bl.covered?T.muted:T.text}}><InlineEdit T={T} value={bl.title} onChange={v=>ubt(bl.id,v)}/></div>
                  {bl.time&&bl.time!=="—"&&<span style={{fontSize:11,color:T.faint}}>{bl.time}</span>}
                  <div onClick={e=>{e.stopPropagation();tc(bl.id);}}><Check T={T} checked={bl.covered} onChange={()=>{}} size={16}/></div>

                </div>
                {io&&<div style={{padding:"8px 0 4px 32px"}}><FNotes T={T} value={bl.notes} onChange={v=>ubn(bl.id,v)} source={`Session: ${s.label}`} update={update} ph="Block notes..."/>{bl.notes?.trim()&&(()=>{const src=`Session: ${s.label}`;const open=(data.nextSteps||[]).filter(n=>n.source===src&&!n.done);const done=(data.nextSteps||[]).filter(n=>n.source===src&&n.done);if(!open.length&&!done.length)return null;return <div style={{marginTop:8,padding:"8px 12px",background:T.surface2,borderRadius:8,borderLeft:`2px solid ${T.accentBorder}`}}><div style={{fontSize:10,fontWeight:600,color:T.faint,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Next steps</div>{open.map(n=><div key={n.id} style={{fontSize:12,color:T.muted,padding:"2px 0",display:"flex",gap:6,alignItems:"flex-start"}}><span style={{color:T.accent,flexShrink:0}}>→</span><span>{linkify(n.text)}</span></div>)}{done.map(t=><div key={t.id} style={{fontSize:12,color:T.faint,padding:"2px 0",display:"flex",gap:6,alignItems:"flex-start"}}><span style={{flexShrink:0}}>✓</span><span style={{textDecoration:"line-through"}}>{linkify(t.text)}</span></div>)}</div>;})()}</div>}
              </div>;})}
            </div>}
            {ab?<AddForm T={T} fields={[{key:"title",label:"Block"},{key:"time",label:"Time",default:"5 min"}]} onAdd={addb} onCancel={()=>setAb(false)}/>:<AddBtn T={T} onClick={()=>setAb(true)} label="Add block"/>}
          </div>}
        </Card>;
      };
      const prevWeeks=(data.previousWeeks||[]).slice().filter(b=>(b.sessions||[]).length>0).sort((a,b)=>(b.year-a.year)||(b.week-a.week));

      const renderArchivedSession=(s)=>{
        const isO=!!openArchiveSession[s.id];
        const hasNotes=(s.blocks||[]).some(b=>b.notes?.trim());
        const tot=(s.blocks||[]).length,cv=(s.blocks||[]).filter(b=>b.covered).length;
        return <Card T={T} key={s.id} style={{padding:0,overflow:"hidden",opacity:.9}}>
          <div onClick={()=>setOpenArchiveSession(x=>({...x,[s.id]:!x[s.id]}))} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.label}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:T.muted,marginTop:2}}>
                <span>{fmtDateLong(s.date)}{s.startTime?` · ${s.startTime}`:""}</span>
                <Pill text={s.type==="show-note"?"Show & Note":"Meeting"} bg={s.type==="show-note"?T.indigoBg:T.blueBg} color={s.type==="show-note"?T.indigoText:T.blueText}/>
                {tot>0&&<span style={{fontSize:11,color:T.faint}}>{cv}/{tot} blocks</span>}
                {hasNotes&&<span style={{fontSize:11,color:T.accent}}>● has notes</span>}
              </div>
            </div>
            <span style={{fontSize:12,color:T.faint,transform:isO?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
          </div>
          {isO&&<div style={{borderTop:`1px solid ${T.border}`,padding:"10px 16px 14px"}}>
            {(s.blocks||[]).length===0&&<div style={{fontSize:12,color:T.faint,padding:"4px 0"}}>No blocks captured.</div>}
            {(s.blocks||[]).map((bl,idx)=>{const bKey=s.id+":"+bl.id;const bo=!!openArchiveBlock[bKey];return <div key={bl.id} style={{opacity:bl.covered?.7:1,borderBottom:`1px solid ${T.border}`,padding:"6px 0"}}>
              <div onClick={()=>setOpenArchiveBlock(x=>({...x,[bKey]:!x[bKey]}))} style={{display:"flex",alignItems:"center",gap:10,cursor:bl.notes?.trim()?"pointer":"default"}}>
                <div style={{width:20,height:20,borderRadius:10,background:T.surface2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:T.muted,flexShrink:0}}>{idx+1}</div>
                <div style={{flex:1,fontSize:12,fontWeight:500,color:bl.covered?T.muted:T.text}}>{bl.title}</div>
                {bl.time&&bl.time!=="—"&&<span style={{fontSize:11,color:T.faint}}>{bl.time}</span>}
                {bl.notes?.trim()&&<span style={{fontSize:10,color:T.accent}}>●</span>}
              </div>
              {bo&&bl.notes?.trim()&&<div style={{padding:"6px 0 4px 30px",fontSize:12,color:T.muted,whiteSpace:"pre-wrap",lineHeight:1.5}}>{linkify(bl.notes)}</div>}
            </div>;})}
          </div>}
        </Card>;
      };

      return <div>
        <PageHeader T={T} title="Sessions." sub="Meetings, reviews, and notes." menuItems={[{label:"Archive section",action:archS}]}/>
        <AutomationSection T={T} tasks={SESSIONS_AUTOMATIONS}/>
        <div style={{marginBottom:12}}>
          {cs?<AddForm T={T} fields={[{key:"label",label:"Title",placeholder:"e.g. Menno 1:1, Design Review..."},{key:"date",label:"Date",default:today()},{key:"startTime",label:"Time",type:"time",default:new Date().toTimeString().slice(0,5)}]} onAdd={crs} onCancel={()=>setCs(false)}/>
          :<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setCs(true)} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,padding:"10px 18px",borderRadius:100,border:`1px dashed ${T.accent}`,background:"transparent",color:T.accent,cursor:"pointer",fontFamily:"inherit"}}><Plus/> New session</button>
            <button onClick={()=>icsRef.current?.click()} title="Import next 7 days of accepted events from a Google Calendar .ics export" style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,padding:"10px 18px",borderRadius:100,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,cursor:"pointer",fontFamily:"inherit"}}>Import .ics</button>
            <input type="file" accept=".ics,text/calendar" ref={icsRef} style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)handleIcsImport(f);e.target.value="";}}/>
            {importStats&&<span style={{fontSize:12,color:importStats.error?T.redText:T.accent,padding:"4px 10px",borderRadius:100,background:T.surface2}}>{importStats.error?`Error: ${importStats.error}`:`Imported ${importStats.added} new · ${importStats.skipped} already existed · ${importStats.parsed} total parsed`}</span>}
          </div>}
        </div>
        <Lbl T={T} rightSlot={<SortCtrl T={T} sort={sort} setSort={setSort} options={[{field:"date",label:"Date",dir:"desc"},{field:"name",label:"Name",dir:"asc"}]} style={{marginBottom:0}}/>}>This week</Lbl>
        {sorted.length>0?sorted.map(s=>renderSession(s)):<Card T={T} style={{textAlign:"center",padding:"2rem",color:T.muted}}><div style={{fontSize:13}}>No sessions this week yet.</div></Card>}
        {prevWeeks.length>0&&<>
          <Lbl T={T}>Previous weeks</Lbl>
          {prevWeeks.map(pw=>{
            const isO=!!openArchiveWeek[pw.id];
            const sess=(pw.sessions||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
            return <Card T={T} key={pw.id} style={{padding:0,overflow:"hidden"}}>
              <div onClick={()=>setOpenArchiveWeek(s=>({...s,[pw.id]:!s[pw.id]}))} style={{padding:"12px 16px",cursor:"pointer",display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:8,height:8,borderRadius:4,background:T.faint,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:T.text}}>Week {pw.week} · {pw.year}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:1}}>{pw.dateRange} · {sess.length} session{sess.length===1?"":"s"}</div>
                </div>
                <span style={{fontSize:12,color:T.faint,width:12,textAlign:"center"}}>{isO?"▾":"▸"}</span>
              </div>
              {isO&&<div style={{borderTop:`1px solid ${T.border}`,padding:"10px 12px 14px"}}>
                {sess.map(s=>renderArchivedSession(s))}
              </div>}
            </Card>;
          })}
        </>}
      </div>;
    }

    function ArchivePage({data,update,T,setPage}) {
      const archived=data.archivedSections||[];const labels={thisweek:"This Week",nextsteps:"Next Steps",sessions:"Sessions",timeline:"Timeline"};
      const restore=id=>{update(d=>({...d,archivedSections:(d.archivedSections||[]).filter(s=>s!==id)}));setPage(id);};
      return <div><h1 style={{fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif",fontWeight:700,fontSize:26,letterSpacing:"-0.02em",color:T.text,lineHeight:1.15,marginBottom:24}}>Archive.</h1>{archived.length===0&&<Card T={T} style={{textAlign:"center",padding:"2.5rem"}}><div style={{fontSize:13,color:T.muted}}>Nothing archived.</div></Card>}{archived.map(id=><Card T={T} key={id} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:500,color:T.text}}>{labels[id]||id}</div><div style={{fontSize:12,color:T.faint}}>Archived</div></div><button onClick={()=>restore(id)} style={{fontSize:12,fontWeight:500,padding:"6px 14px",borderRadius:100,border:`1px solid ${T.accent}`,background:T.accentLight,color:T.accent,cursor:"pointer",fontFamily:"inherit"}}>Restore</button></Card>)}</div>;
    }

    /* ═══════════════ SHELL ═══════════════ */
    const ALL_PAGES=[{id:"thisweek",label:"This week"},{id:"nextsteps",label:"Next steps"},{id:"sessions",label:"Sessions"},{id:"timeline",label:"Timeline"}];

    const WelcomeModal = ({T,initialName,initialRole,onSave,onSkip}) => {
      const [n,setN] = useState(initialName && initialName !== "Name" ? initialName : "");
      const [r,setR] = useState(initialRole && initialRole !== "Role" ? initialRole : "");
      const canSave = n.trim() && r.trim();
      const submit = () => { if (canSave) onSave(n.trim(), r.trim()); };
      const onKey = e => { if (e.key === "Enter") submit(); };
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif"}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"28px 28px 22px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}}>
          <div style={{fontSize:18,fontWeight:700,color:T.text,marginBottom:6}}>Welcome</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:20,lineHeight:1.5}}>Add your details. They will appear in the sidebar and in your weekly reports.</div>
          <label style={{display:"block",fontSize:10,fontWeight:600,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Name</label>
          <input autoFocus value={n} onChange={e=>setN(e.target.value)} onKeyDown={onKey} placeholder="Your name" style={{width:"100%",padding:"10px 12px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:14,color:T.text,background:T.pageBg,outline:"none",marginBottom:14,fontFamily:"inherit",boxSizing:"border-box"}}/>
          <label style={{display:"block",fontSize:10,fontWeight:600,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Role</label>
          <input value={r} onChange={e=>setR(e.target.value)} onKeyDown={onKey} placeholder="Your role" style={{width:"100%",padding:"10px 12px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:14,color:T.text,background:T.pageBg,outline:"none",marginBottom:20,fontFamily:"inherit",boxSizing:"border-box"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={onSkip} style={{background:"none",border:"none",color:T.muted,padding:"9px 4px",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Skip</button>
            <button disabled={!canSave} onClick={submit} style={{background:canSave?T.accent:T.surface2,color:canSave?"#FFFFFF":T.faint,border:"none",padding:"9px 20px",borderRadius:6,fontSize:13,fontWeight:500,cursor:canSave?"pointer":"not-allowed",fontFamily:"inherit",transition:"all 0.15s"}}>Save</button>
          </div>
        </div>
      </div>;
    };

    function App() {
      const [data,setData]=useState(null);const [page,setPage]=useState("thisweek");const [loading,setLoading]=useState(true);const [err,setErr]=useState(null);
      const restoreRef=useRef(null);
      const [backupStatus,setBackupStatus]=useState("");
      const [settingsOpen,setSettingsOpen]=useState(false);
      const settingsRef=useRef(null);
      const [welcomeSkipped,setWelcomeSkipped]=useState(false);
      useEffect(()=>{if(!settingsOpen)return;const h=e=>{if(settingsRef.current&&!settingsRef.current.contains(e.target))setSettingsOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[settingsOpen]);
      useEffect(()=>{loadData().then(d=>{setData(d);setLoading(false);document.body.style.background=d.theme==="dark"?"#1C1C1E":"#FFFFFF";}).catch(e=>setErr(e.message));},[]);
      const update=useCallback(fn=>{setData(prev=>{const next=fn(prev);saveData(next);return next;});},[]);
      const toggleTheme=()=>update(d=>{const t=d.theme==="dark"?"light":"dark";try{localStorage.setItem("cw-theme",t);}catch(e){}document.body.style.background=t==="dark"?"#1C1C1E":"#FFFFFF";return{...d,theme:t};});
      const backup=()=>{if(!data)return;const json=JSON.stringify(data,null,2);const blob=new Blob([json],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="weekly_"+today()+".json";a.click();URL.revokeObjectURL(a.href);setBackupStatus("exported");setTimeout(()=>setBackupStatus(""),2000);};
      const clearAll=()=>{if(!confirm("Clear all data? This cannot be undone."))return;const empty={_schemaVersion:17,theme:data.theme,archivedSections:[],userName:"Name",userRole:"Role",focusAreas:[],thisWeek:[],previousWeeks:[],nextSteps:[],timeline:[],weeklyReports:[],initiatives:[],contextItems:[],sessions:[]};setData(empty);saveData(empty);};
      const restore=file=>{if(!file)return;const r=new FileReader();r.onload=e=>{try{const parsed=JSON.parse(e.target.result);const migrated=migrate(parsed);setData(migrated);saveData(migrated);}catch(e2){alert("Invalid backup file.");}};r.readAsText(file);};
      const T=useT(data||{theme:"light"});

      if(err) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"-apple-system, 'SF Pro Text', sans-serif",color:"#D70015",background:"#FFFFFF",flexDirection:"column",gap:8}}><div style={{fontWeight:600}}>Error loading</div><div style={{fontSize:13}}>{err}</div></div>;
      if(loading||!data) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"-apple-system, 'SF Pro Text', sans-serif",color:"#86868B",background:"#FFFFFF"}}>Loading...</div>;

      const archived=data.archivedSections||[];const visiblePages=ALL_PAGES.filter(p=>!archived.includes(p.id));
      const twO=data.thisWeek.filter(t=>!t.done).length;
      if(archived.includes(page)&&page!=="archive"){const first=visiblePages[0]?.id||"archive";if(page!==first)setPage(first);}

      const needsWelcome = !data.userName || data.userName === "Name" || !data.userRole || data.userRole === "Role";

      return <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif",fontSize:15,lineHeight:1.6,color:T.text,background:T.pageBg}}>
        {needsWelcome && !welcomeSkipped && <WelcomeModal T={T} initialName={data.userName} initialRole={data.userRole} onSave={(n,r)=>update(d=>({...d,userName:n,userRole:r}))} onSkip={()=>setWelcomeSkipped(true)}/>}
        <button onClick={toggleTheme} title="Toggle theme" style={{position:"fixed",top:16,right:16,zIndex:100,background:T.surface,border:`1px solid ${T.border}`,color:T.muted,width:36,height:36,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>{data.theme==="dark"?<Sun/>:<Moon/>}</button>
        <div ref={settingsRef} style={{position:"fixed",top:16,right:60,zIndex:100}}>
          <input ref={restoreRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])restore(e.target.files[0]);e.target.value="";}}/>
          <button onClick={()=>setSettingsOpen(!settingsOpen)} title="Data" aria-haspopup="true" aria-expanded={settingsOpen} style={{background:T.surface,border:`1px solid ${T.border}`,color:T.muted,width:36,height:36,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4.5 6.5L7 9l2.5-2.5M2.5 11.5h9" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          {settingsOpen&&<div role="menu" style={{position:"absolute",top:"calc(100% + 6px)",right:0,minWidth:200,background:T.menuBg,border:`1px solid ${T.border}`,borderRadius:8,boxShadow:T.menuShadow,padding:4,display:"flex",flexDirection:"column"}}>
            <button role="menuitem" onClick={()=>{backup();setSettingsOpen(false);}} style={{textAlign:"left",padding:"8px 12px",fontSize:12,fontFamily:"inherit",background:"transparent",border:"none",color:T.text,cursor:"pointer",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.background=T.surface2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{backupStatus==="exported"?"✓ Exported":"Export data (.json)"}</button>
            <button role="menuitem" onClick={()=>{restoreRef.current?.click();setSettingsOpen(false);}} style={{textAlign:"left",padding:"8px 12px",fontSize:12,fontFamily:"inherit",background:"transparent",border:"none",color:T.text,cursor:"pointer",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.background=T.surface2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>Restore from backup</button>
            <div style={{height:1,background:T.border,margin:"4px 0"}}/>
            <button role="menuitem" onClick={()=>{clearAll();setSettingsOpen(false);}} style={{textAlign:"left",padding:"8px 12px",fontSize:12,fontFamily:"inherit",background:"transparent",border:"none",color:T.redText,cursor:"pointer",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.background=T.redBg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>Clear all data</button>
          </div>}
        </div>
        <nav style={{width:220,flexShrink:0,background:T.surface,borderRight:`1px solid ${T.border}`,padding:"1.25rem 0",position:"sticky",top:0,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"0 1.25rem 1rem",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
            <a href="/" title="Workspace" aria-label="Back to Workspace" style={{textDecoration:"none",display:"inline-flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:8,background:T.surface,border:`1px solid ${T.border}`,color:T.muted,marginBottom:12,transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}} onMouseEnter={e=>{e.currentTarget.style.color=T.accent;e.currentTarget.style.borderColor=T.accent;}} onMouseLeave={e=>{e.currentTarget.style.color=T.muted;e.currentTarget.style.borderColor=T.border;}}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3L4.5 7L8.5 11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg></a>
            <div style={{fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif",fontWeight:700,fontSize:18,color:T.text,lineHeight:1.2}}>Plan &amp; Track</div>
          </div>
          <div style={{padding:"0.75rem 0.75rem 0",flex:1,minHeight:0,overflowY:"auto"}}>
            {visiblePages.map(p=>{const a=page===p.id;const badge=p.id==="thisweek"?twO:null;
            return <button key={p.id} onClick={()=>setPage(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,cursor:"pointer",color:a?T.accent:T.muted,fontSize:13,fontWeight:a?500:400,background:a?T.accentLight:"transparent",border:"none",width:"100%",textAlign:"left",marginBottom:1,fontFamily:"inherit"}}><span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",opacity:a?1:.4,flexShrink:0}}/><span style={{flex:1}}>{p.label}</span>{badge>0&&<span style={{fontSize:10,fontWeight:600,background:a?T.accent:T.surface2,color:a?"#FFFFFF":T.muted,borderRadius:100,padding:"2px 7px",minWidth:18,textAlign:"center",lineHeight:"14px"}}>{badge}</span>}</button>;})}
          </div>
          {archived.length>0&&<div style={{padding:"0 0.75rem 1rem",flexShrink:0}}>
            <button onClick={()=>setPage("archive")} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,cursor:"pointer",color:page==="archive"?T.accent:T.faint,fontSize:13,fontWeight:page==="archive"?500:400,background:page==="archive"?T.accentLight:"transparent",border:"none",width:"100%",textAlign:"left",fontFamily:"inherit"}}><span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",opacity:.3,flexShrink:0}}/><span>Archive</span></button>
          </div>}
          <div style={{padding:"1rem 1.25rem 40px",borderTop:`1px solid ${T.border}`,flexShrink:0}}>
            <div style={{fontFamily:"-apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif",fontWeight:400,fontSize:14,color:T.text,lineHeight:1.2}}><InlineEdit T={T} value={data.userName} onChange={v=>update(d=>({...d,userName:v}))} placeholder="Name"/></div>
            <div style={{fontSize:11,color:T.muted,marginTop:3,fontWeight:300}}><InlineEdit T={T} value={data.userRole} onChange={v=>update(d=>({...d,userRole:v}))} placeholder="Role" style={{color:T.muted}}/></div>
          </div>
        </nav>
        <main style={{flex:1,overflowY:"auto",height:"100vh"}}>
          <div style={{maxWidth:860,padding:"2.5rem 3rem",marginLeft:"max(0px, calc(50vw - 650px))",marginRight:"auto"}}>
            {page==="thisweek"&&<ThisWeekPage data={data} update={update} T={T}/>}
            {page==="nextsteps"&&<NextStepsPage data={data} update={update} T={T}/>}
            {page==="sessions"&&<SessionsPage data={data} update={update} T={T}/>}
            {page==="timeline"&&<TimelinePage data={data} update={update} T={T}/>}
            {page==="archive"&&<ArchivePage data={data} update={update} T={T} setPage={setPage}/>}
          </div>
        </main>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
